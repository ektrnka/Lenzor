name: my_button_app_new
description: "Линзор - Мониторинг контактных линз"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.9

  # State management and data persistence
  shared_preferences: ^2.5.5

  # Date and time utilities
  intl: ^0.20.2
  table_calendar: ^3.0.9

  # Notifications and time zones
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  permission_handler: ^11.0.0
  home_widget: ^0.9.1

  # Auth and sync
  google_sign_in: ^6.2.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.2
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/branding/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon_square_safe.png"
  adaptive_icon_background: "#0A567D"
  adaptive_icon_foreground: "assets/branding/icon_foreground_safe.png"
  adaptive_icon_foreground_inset: 16
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A567D"
  image: assets/branding/icon_foreground.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#0A567D"
    image: assets/branding/icon_foreground.png
    icon_background_color: "#0A567D"
